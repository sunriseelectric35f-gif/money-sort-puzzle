name: Build Unsigned iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-latest

    # Expo SDK56 ships a *prebuilt* React Native Core (RCT_USE_PREBUILT_RNCORE=1)
    # whose per-configuration "Build … xcframework" / "Replace React Native Core"
    # script phases reliably fail under `xcodebuild archive` in CI (exit 65).
    # Forcing source builds removes those switch scripts and archives cleanly.
    env:
      RCT_USE_PREBUILT_RNCORE: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true  # token optional for local build

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document 2>&1 | tail -3
          pod --version

      - name: Generate native iOS project
        run: |
          npx expo prebuild --platform ios --clean 2>&1

      - name: Install CocoaPods deps
        working-directory: ios
        run: |
          pod install --repo-update 2>&1 | tail -20

      # SDK56 ships ExpoModulesJSI as an *always-prebuilt* Swift/C++ xcframework.
      # Its podspec script phase runs a nested `xcodebuild build -quiet` DURING
      # `xcodebuild archive`; that nested build is fragile (relies on resolved
      # SPM/cache state) and `-quiet` hides the real compile error behind a bare
      # "ARCHIVE FAILED" (exit 65). We defuse this by building the device slice
      # HERE, in its own step, with `-quiet` stripped so any genuine error is
      # visible. The script hashes its inputs, so the archive's script phase then
      # finds the slice up-to-date and becomes a no-op — removing archive-time
      # fragility entirely.
      - name: Prebuild ExpoModulesJSI xcframework (verbose, device slice)
        working-directory: ios
        run: |
          set -eo pipefail
          JSI="../node_modules/expo-modules-jsi/apple"
          SCRIPT="$JSI/scripts/build-xcframework.sh"
          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::ExpoModulesJSI build script not present — skipping prebuild"
            exit 0
          fi
          # Strip `-quiet` from the nested xcodebuild so real errors surface.
          sed -i.bak '/^[[:space:]]*-quiet \\$/d' "$SCRIPT"
          echo "Building ExpoModulesJSI device slice (iphoneos)…"
          PODS_ROOT="$(pwd)/Pods" PLATFORM_NAME=iphoneos \
            DEVELOPER_DIR="$(xcode-select -p)" \
            bash "$SCRIPT" 2>&1 | tee /tmp/jsi-build.log || {
              echo "::error::ExpoModulesJSI xcframework prebuild failed — real compiler error is above (no longer hidden by -quiet)"
              exit 1
            }
          echo "=== built slices ==="
          ls -la "$JSI/Products/ExpoModulesJSI.xcframework" 2>&1 || true

      - name: Build unsigned IPA (xcodebuild)
        run: |
          set -eo pipefail
          cd ios

          # Determine scheme — use -d so ls prints the dir itself, not its contents
          SCHEME=$(ls -d *.xcworkspace | head -1 | sed 's/.xcworkspace//')
          echo "Scheme: $SCHEME"

          # Build archive (CODE_SIGNING_ALLOWED=NO → unsigned).
          # pipefail ensures a real xcodebuild failure fails this step instead of
          # being masked by the trailing `tee`.
          xcodebuild archive \
            -workspace "${SCHEME}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "/tmp/${SCHEME}.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tee /tmp/xcodebuild.log | tail -40

          echo "=== archive tree ==="
          ls -lR "/tmp/${SCHEME}.xcarchive" 2>&1 | head -40 || true

      - name: Package unsigned IPA
        run: |
          set -eo pipefail
          SCHEME=$(ls -d ios/*.xcworkspace | head -1 | sed 's|ios/||;s/.xcworkspace//')
          ARCHIVE="/tmp/${SCHEME}.xcarchive"

          # Locate the built .app robustly — prefer the archive, then fall back to
          # any DerivedData/build product. Avoids the brittle hardcoded
          # Products/Applications path that breaks when xcodebuild lays it elsewhere.
          APP=$(find "$ARCHIVE" -type d -name '*.app' 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "No .app in archive; searching build dirs…"
            APP=$(find /tmp ~/Library/Developer/Xcode/DerivedData ios -type d -name '*.app' 2>/dev/null | grep -i release | head -1)
          fi
          if [ -z "$APP" ]; then
            echo "::error::Could not locate a built .app bundle"
            find "$ARCHIVE" -maxdepth 4 2>/dev/null | head -60
            exit 1
          fi
          echo "Found app: $APP"

          rm -rf /tmp/ipa_export && mkdir -p /tmp/ipa_export/Payload
          cp -R "$APP" /tmp/ipa_export/Payload/
          cd /tmp/ipa_export
          zip -qry "${SCHEME}-unsigned.ipa" Payload/
          mv "${SCHEME}-unsigned.ipa" "$GITHUB_WORKSPACE/"

          echo "IPA_NAME=${SCHEME}-unsigned.ipa" >> "$GITHUB_ENV"
          ls -lh "$GITHUB_WORKSPACE/${SCHEME}-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: '*.ipa'
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Unsigned IPA Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To sideload: use AltStore, Sideloadly, or iOS App Installer (requires free Apple ID — 7-day expiry)." >> $GITHUB_STEP_SUMMARY
          echo "For permanent install: sign with your provisioning profile." >> $GITHUB_STEP_SUMMARY
